<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>VS Code Windows</title>
    <link rel="stylesheet" href="panel.css" />
  </head>
  <body>
    <div id="app">
      <!-- ─── Toolbar ──────────────────────────────────────────── -->
      <div class="toolbar">
        <span class="toolbar-title">&#x2301; Windows</span>
        <div class="toolbar-actions">
          <button class="btn" id="newWinBtn" title="New window">+</button>
          <button class="btn" id="openPanelBtn" title="Open as tab">&#x25A2;</button>
        </div>
      </div>

      <!-- ─── Layout presets ───────────────────────────────────── -->
      <div class="presets">
        <button class="preset-btn" data-layout="grid" title="Grid">&#x25A6;</button>
        <button class="preset-btn" data-layout="side-by-side" title="Side by side">&#x25A4;</button>
        <button class="preset-btn" data-layout="stacked" title="Stacked">&#x25AE;</button>
        <button class="preset-btn" data-layout="focus+sidebar" title="Focus + sidebar">&#x25A5;</button>
        <button class="preset-btn" id="snapLeftBtn" title="Snap focused left">&#x25E7;</button>
        <button class="preset-btn" id="snapRightBtn" title="Snap focused right">&#x25E8;</button>
      </div>

      <!-- ─── Layout canvas ────────────────────────────────────── -->
      <div class="canvas-container">
        <div id="layoutCanvas" class="layout-canvas">
          <div class="canvas-empty">No windows open</div>
        </div>
      </div>

      <!-- ─── Status bar ────────────────────────────────────────── -->
      <div class="status-bar">
        <span id="winCount">0 windows</span>
        <span id="layoutInfo">Custom layout</span>
      </div>
    </div>
    <script src="panel.js"></script>
  </body>
</html>
